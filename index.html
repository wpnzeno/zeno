<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Private Archive | Admin Vault</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="badge"><i class="fas fa-lock"></i> SECURE VAULT // ADMIN ACCESS ONLY</div>
  <h1>my archive</h1>
  <p class="sub">files · links · encrypted aura</p>

  <div class="tabs">
    <button id="tabPublicBtn" class="tab-btn active"><i class="fas fa-globe"></i> Public feed</button>
    <button id="tabAdminBtn" class="tab-btn"><i class="fas fa-user-astronaut"></i> Admin zone</button>
  </div>

  <div id="publicPanel" class="panel">
    <div class="glass-card">
      <div class="card-header"><i class="fas fa-satellite-dish"></i> public feed <span class="badge-light">read-only · cosmic view</span></div>
      <div id="publicPostsContainer" class="posts-list"><div class="placeholder"><i class="fas fa-spinner fa-pulse"></i> loading archive...</div></div>
    </div>
  </div>

  <div id="adminPanel" class="panel hidden">
    <div class="glass-card">
      <div id="adminContentArea" class="admin-dynamic"><div class="placeholder"><i class="fas fa-key"></i> verifying quantum access...</div></div>
    </div>
  </div>

  <footer><i class="fas fa-database"></i> local storage (IndexedDB) · only you hold the decryption key</footer>
</div>
<script src="script.js"></script>
</body>
</html>
