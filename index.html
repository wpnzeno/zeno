<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeno</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ========== FULL CSS (embedded, guaranteed to work) ========== */
    :root {
      --bg-dark: #0a0c15;
      --bg-card: rgba(15, 20, 35, 0.7);
      --border-glow: rgba(0, 224, 255, 0.25);
      --accent-primary: #00e0ff;
      --accent-secondary: #8a2be2;
      --text-light: #f0f3ff;
      --text-muted: #a0a8c0;
      --danger: #ff4d6d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 20%, #0a0f1f, #03050b);
      color: var(--text-light);
      padding: 2rem 1.5rem;
      min-height: 100vh;
    }
    .container { max-width: 1300px; margin: 0 auto; }
    .hero { text-align: center; margin-bottom: 3rem; }
    .badge-group { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1rem; }
    .badge {
      background: rgba(0,224,255,0.1);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-glow);
      padding: 0.4rem 1rem;
      border-radius: 100px;
      font-size: 0.75rem;
      color: var(--accent-primary);
    }
    h1 {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--accent-primary), var(--accent-secondary));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .subtitle { color: var(--text-muted); margin-bottom: 1.5rem; }
    .stats { display: flex; justify-content: center; gap: 3rem; margin-top: 1rem; }
    .stat-number { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--accent-primary), #fff); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .stat-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); }
    .tabs { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
    .tab-btn {
      background: rgba(15,20,35,0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0,224,255,0.3);
      padding: 0.7rem 1.8rem;
      border-radius: 40px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .tab-btn.active {
      background: linear-gradient(95deg, var(--accent-primary), var(--accent-secondary));
      color: white;
      box-shadow: 0 0 15px rgba(0,224,255,0.4);
    }
    .panel.hidden { display: none; }
    .section-header { margin-bottom: 2rem; }
    .section-header h2 { font-size: 1.8rem; display: flex; align-items: center; gap: 0.6rem; }
    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .post-card, .admin-tool-card {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      border: 1px solid var(--border-glow);
      padding: 1.5rem;
      transition: 0.25s;
    }
    .post-card:hover, .admin-tool-card:hover { transform: translateY(-4px); border-color: var(--accent-primary); }
    .post-title, .tool-title { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; }
    .post-description, .tool-desc { font-size: 0.85rem; color: var(--text-muted); margin: 0.5rem 0 1rem; }
    .post-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; color: #6c7a9e; }
    .btn-icon, .btn-primary {
      background: rgba(0,224,255,0.1);
      border: 1px solid var(--border-glow);
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.7rem;
      cursor: pointer;
      color: var(--accent-primary);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn-primary { background: linear-gradient(95deg, var(--accent-primary), var(--accent-secondary)); color: white; border: none; padding: 0.6rem 1.2rem; }
    .btn-danger { border-color: var(--danger); color: #ff9eae; }
    .admin-form {
      background: rgba(15,25,45,0.6);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border-left: 3px solid var(--accent-primary);
    }
    .admin-form input, .admin-form textarea, .file-input {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid #2a3560;
      padding: 0.7rem;
      border-radius: 1rem;
      color: white;
      margin-bottom: 0.8rem;
    }
    .tool-stats { display: flex; gap: 1.5rem; margin: 0.8rem 0; font-size: 0.8rem; }
    .tool-actions { display: flex; gap: 0.8rem; margin-top: 0.5rem; }
    .loading-state { text-align: center; padding: 3rem; color: var(--text-muted); }
    footer { margin-top: 4rem; text-align: center; border-top: 1px solid rgba(0,224,255,0.2); padding-top: 2rem; }
    .footer-links { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1rem; }
    .footer-links a { color: var(--text-muted); text-decoration: none; }
    .footer-links a:hover { color: var(--accent-primary); }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="badge-group">
      <span class="badge"><i class="fas fa-lock"></i> secure</span>
      <span class="badge"><i class="fas fa-user-shield"></i> trusted</span>
    </div>
    <h1>my archive</h1>
    <p class="subtitle">scripts · config files · executors</p>
    <div class="stats">
      <div class="stat"><div class="stat-number" id="statPosts">0</div><div class="stat-label">total posts</div></div>
      <div class="stat"><div class="stat-number" id="statFiles">0</div><div class="stat-label">files</div></div>
      <div class="stat"><div class="stat-number" id="statLinks">0</div><div class="stat-label">links</div></div>
    </div>
  </div>

  <div class="tabs">
    <button id="tabPublicBtn" class="tab-btn active"><i class="fas fa-globe"></i> content</button>
    <button id="tabAdminBtn" class="tab-btn"><i class="fas fa-user-shield"></i> admin</button>
  </div>

  <div id="publicPanel" class="panel">
    <div class="section-header"><h2><i class="fas fa-archive"></i> Contents</h2><p>downloadable resources</p></div>
    <div id="publicPostsContainer" class="posts-grid"><div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> loading...</div></div>
  </div>

  <div id="adminPanel" class="panel hidden">
    <div class="section-header"><h2><i class="fas fa-crown"></i> admin panel</h2><p>manage tools & content</p></div>
    <div id="adminContentArea" class="admin-dynamic"><div class="loading-state"><i class="fas fa-key"></i> verifying access...</div></div>
  </div>

  <footer><div class="footer-links"><a href="#https://youtube.com/@wpn-zeno"><i class="fab fa-twitter"></i> Twitter</a><a href="#"><i class="fab fa-discord"></i> Discord</a><a href="#"><i class="fas fa-database"></i> local storage</a></div><p>© 2025 – only you can post · data stored in your browser</p></footer>
</div>

<script>
  // ========== FULL JAVASCRIPT (embedded, same as before) ==========
  const DB_NAME = "PrivateArchiveDB";
  const DB_VERSION = 6;
  const STORE_NAME = "posts";
  const STORED_PASSWORD_KEY = "archive_admin_pass";
  const DEFAULT_PASSWORD = "admin123";
  let dbInstance = null;
  let currentAdminLoggedIn = false;

  function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }
  function formatFileSize(bytes) { if (!bytes) return "0 B"; const k=1024, sizes=["B","KB","MB","GB"]; const i=Math.floor(Math.log(bytes)/Math.log(k)); return parseFloat((bytes/Math.pow(k,i)).toFixed(1))+" "+sizes[i]; }
  function initPassword() { if (!localStorage.getItem(STORED_PASSWORD_KEY)) localStorage.setItem(STORED_PASSWORD_KEY, DEFAULT_PASSWORD); }

  function openDB() {
    return new Promise((resolve, reject) => {
      if (dbInstance && dbInstance.name === DB_NAME) return resolve(dbInstance);
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => { dbInstance = request.result; resolve(dbInstance); };
      request.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true }).createIndex("createdAt", "createdAt");
        }
      };
    });
  }

  async function getAllPosts() {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readonly");
      const index = tx.objectStore(STORE_NAME).index("createdAt");
      const req = index.openCursor(null, "prev");
      const results = [];
      req.onsuccess = (e) => { const c = e.target.result; if(c) { let p=c.value; if(p.downloads===undefined)p.downloads=0; if(p.rating===undefined)p.rating=0; results.push(p); c.continue(); } else resolve(results); };
      req.onerror = () => reject(req.error);
    });
  }

  async function addPost(postData) { const db=await openDB(); postData.downloads=0; postData.rating=0; return new Promise((res,rej)=>{ const tx=db.transaction(STORE_NAME,"readwrite"); const req=tx.objectStore(STORE_NAME).add(postData); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }
  async function updatePost(id,updatedData) { const db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE_NAME,"readwrite"); const store=tx.objectStore(STORE_NAME); const getReq=store.get(id); getReq.onsuccess=()=>{ const old=getReq.result; if(!old)rej("not found"); const merged={...old,...updatedData,id:old.id}; store.put(merged).onsuccess=()=>res(); }; getReq.onerror=()=>rej(getReq.error); }); }
  async function deletePostById(id) { const db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE_NAME,"readwrite"); tx.objectStore(STORE_NAME).delete(id).onsuccess=()=>res(); }); }
  async function incrementDownloads(id) { const posts=await getAllPosts(); const post=posts.find(p=>p.id===id); if(post) await updatePost(id,{downloads:(post.downloads||0)+1}); }

  async function updateStats() { const posts=await getAllPosts(); document.getElementById("statPosts").innerText=posts.length; document.getElementById("statFiles").innerText=posts.filter(p=>p.type==="file").length; document.getElementById("statLinks").innerText=posts.filter(p=>p.type==="link").length; }

  async function renderPublicFeed() {
    const container=document.getElementById("publicPostsContainer"); if(!container)return;
    try{
      const posts=await getAllPosts(); await updateStats();
      if(!posts.length){ container.innerHTML=`<div class="loading-state"><i class="fas fa-inbox"></i> nothing posted yet</div>`; return; }
      let html='';
      for(const post of posts){
        const date=new Date(post.createdAt).toLocaleDateString();
        if(post.type==="link"){
          html+=`<div class="post-card"><div class="post-title"><i class="fas fa-link"></i> ${escapeHtml(post.title)}</div>${post.description?`<div class="post-description">${escapeHtml(post.description)}</div>`:''}<div class="post-meta"><span><i class="fas fa-download"></i> ${post.downloads||0}</span><a href="#" class="btn-icon open-link" data-id="${post.id}" data-url="${escapeHtml(post.url)}"><i class="fas fa-external-link-alt"></i> open</a></div></div>`;
        } else {
          const file=post.fileData; const isImage=file?.type?.startsWith("image/");
          html+=`<div class="post-card"><div class="post-title"><i class="fas fa-file-alt"></i> ${escapeHtml(post.title)}</div>${post.description?`<div class="post-description">${escapeHtml(post.description)}</div>`:''}<div class="post-meta"><span><i class="fas fa-download"></i> ${post.downloads||0}</span><button class="btn-icon download-file" data-id="${post.id}"><i class="fas fa-download"></i> download</button></div>${isImage?`<img id="preview-${post.id}" style="max-height:100px; margin-top:0.5rem; border-radius:0.5rem;">`:''}</div>`;
        }
      }
      container.innerHTML=html;
      for(const post of posts){
        if(post.type==="link"){
          const btn=container.querySelector(`.open-link[data-id="${post.id}"]`);
          btn?.addEventListener("click", async (e)=>{
            e.preventDefault(); await incrementDownloads(post.id); window.open(btn.dataset.url,'_blank'); renderPublicFeed();
          });
        } else if(post.type==="file" && post.fileData?.blob){
          const btn=container.querySelector(`.download-file[data-id="${post.id}"]`);
          btn?.addEventListener("click", async ()=>{
            await incrementDownloads(post.id); downloadFileFromPost(post); renderPublicFeed();
          });
          if(post.fileData.type?.startsWith("image/")){
            const img=document.getElementById(`preview-${post.id}`);
            if(img && post.fileData.blob){ const url=URL.createObjectURL(post.fileData.blob); img.src=url; img.onload=()=>URL.revokeObjectURL(url); }
          }
        }
      }
    }catch(err){ container.innerHTML=`<div class="loading-state">⚠️ error</div>`; }
  }

  function downloadFileFromPost(post){ if(!post.fileData?.blob)return; const a=document.createElement("a"); a.href=URL.createObjectURL(post.fileData.blob); a.download=post.fileData.name; document.body.appendChild(a); a.click(); document.body.removeChild(a); }

  async function renderAdminZone(){
    const container=document.getElementById("adminContentArea"); if(!container)return;
    if(!currentAdminLoggedIn){
      container.innerHTML=`<div style="max-width:420px; margin:2rem auto; text-align:center"><i class="fas fa-fingerprint" style="font-size:2.5rem; color:#00e0ff"></i><h3>admin authentication</h3><p style="font-size:0.8rem">only the owner can manage tools</p><div style="background:rgba(0,0,0,0.5); padding:1.5rem; border-radius:1.5rem"><input type="password" id="adminPassInput" placeholder="master password" style="width:100%; margin-bottom:1rem"><button id="adminLoginBtn" class="btn-primary" style="width:100%"><i class="fas fa-unlock-alt"></i> unlock</button><div style="font-size:0.7rem; margin-top:0.75rem">default: admin123</div></div></div>`;
      document.getElementById("adminLoginBtn")?.addEventListener("click",()=>{ if(document.getElementById("adminPassInput").value.trim()===localStorage.getItem(STORED_PASSWORD_KEY)){ currentAdminLoggedIn=true; renderAdminZone(); renderPublicFeed(); } else alert("❌ wrong password"); });
      return;
    }
    const posts=await getAllPosts();
    container.innerHTML=`<div><div style="display:flex; justify-content:space-between; flex-wrap:wrap; margin-bottom:1.5rem"><h3><i class="fas fa-crown"></i> admin controls</h3><div><button id="changePwdBtn" class="btn-icon"><i class="fas fa-key"></i> change password</button> <button id="logoutAdminBtn" class="btn-icon" style="border-color:#ff4d6d"><i class="fas fa-sign-out-alt"></i> logout</button></div></div><div class="admin-form"><h4><i class="fas fa-link"></i> add new link</h4><input id="linkTitle" placeholder="Title *"><input id="linkUrl" placeholder="URL *"><textarea id="linkDesc" rows="2" placeholder="Description"></textarea><button id="submitLinkBtn" class="btn-primary">publish link</button></div><div class="admin-form"><h4><i class="fas fa-file-upload"></i> upload file</h4><input id="fileTitle" placeholder="Title *"><textarea id="fileDesc" rows="2" placeholder="Description"></textarea><input type="file" id="singleFileInput"><button id="submitFileBtn" class="btn-primary">upload file</button></div><div class="admin-form"><h4><i class="fas fa-layer-group"></i> multiple files</h4><input id="multiTitlePrefix" placeholder="Title prefix"><textarea id="multiDesc" rows="2" placeholder="Common description"></textarea><input type="file" id="multiFileInput" multiple><button id="submitMultiBtn" class="btn-primary">upload all</button></div><h3 style="margin:2rem 0 1rem">manage tools & content</h3><div id="adminPostsList"></div></div>`;
    await renderAdminPostsList(posts);
    document.getElementById("submitLinkBtn")?.addEventListener("click", handleAddLink);
    document.getElementById("submitFileBtn")?.addEventListener("click", handleAddFile);
    document.getElementById("submitMultiBtn")?.addEventListener("click", handleMultipleFiles);
    document.getElementById("logoutAdminBtn")?.addEventListener("click",()=>{ currentAdminLoggedIn=false; renderAdminZone(); renderPublicFeed(); });
    document.getElementById("changePwdBtn")?.addEventListener("click", handlePasswordChange);
  }

  async function renderAdminPostsList(posts){
    const listDiv=document.getElementById("adminPostsList"); if(!posts.length){ listDiv.innerHTML=`<div class="loading-state">no tools yet</div>`; return; }
    let html='';
    for(const post of posts){
      html+=`<div class="admin-tool-card"><div class="tool-header"><div class="tool-title"><i class="fas ${post.type==='link'?'fa-link':'fa-file-alt'}"></i> ${escapeHtml(post.title)}</div><div class="tool-actions"><button class="btn-icon edit-post" data-id="${post.id}" data-type="${post.type}"><i class="fas fa-edit"></i> edit</button><button class="btn-icon btn-danger delete-post" data-id="${post.id}"><i class="fas fa-trash-alt"></i> delete</button></div></div>${post.description?`<div class="tool-desc">${escapeHtml(post.description)}</div>`:''}<div class="tool-stats"><span><i class="fas fa-download"></i> Downloads: ${post.downloads||0}</span><span><i class="fas fa-star"></i> Rating: ${(post.rating||0).toFixed(1)}</span></div></div>`;
    }
    listDiv.innerHTML=html;
    document.querySelectorAll(".delete-post").forEach(btn=>btn.addEventListener("click",async()=>{ if(confirm("Delete?")){ await deletePostById(Number(btn.dataset.id)); renderAdminZone(); renderPublicFeed(); } }));
    document.querySelectorAll(".edit-post").forEach(btn=>btn.addEventListener("click",()=>editPostModal(Number(btn.dataset.id),btn.dataset.type)));
  }

  async function editPostModal(id,type){
    const posts=await getAllPosts(); const post=posts.find(p=>p.id===id); if(!post)return;
    const newTitle=prompt("Edit title:",post.title); if(newTitle===null)return;
    const newDesc=prompt("Edit description:",post.description||"");
    let newDownloads=parseInt(prompt("Downloads count:",post.downloads||0))||0;
    let newRating=parseFloat(prompt("Rating (0-5):",post.rating||0))||0; if(newRating<0)newRating=0; if(newRating>5)newRating=5;
    let updateObj={title:newTitle.trim(),description:newDesc.trim(),downloads:newDownloads,rating:newRating};
    if(type==="link"){ const newUrl=prompt("Edit URL:",post.url); if(!newUrl?.startsWith("http"))return alert("Invalid URL"); updateObj.url=newUrl.trim(); }
    await updatePost(id,updateObj); renderAdminZone(); renderPublicFeed();
  }

  async function handleAddLink(){ const t=document.getElementById("linkTitle")?.value.trim(); const u=document.getElementById("linkUrl")?.value.trim(); const d=document.getElementById("linkDesc")?.value.trim(); if(!t||!u)return alert("Required"); if(!u.startsWith("http"))return alert("Invalid URL"); await addPost({type:"link",title:t,description:d||"",url:u,createdAt:Date.now()}); document.getElementById("linkTitle").value=""; document.getElementById("linkUrl").value=""; document.getElementById("linkDesc").value=""; renderAdminZone(); renderPublicFeed(); }
  async function handleAddFile(){ const t=document.getElementById("fileTitle")?.value.trim(); const d=document.getElementById("fileDesc")?.value.trim(); const f=document.getElementById("singleFileInput").files[0]; if(!t||!f)return alert("Title and file required"); await addPost({type:"file",title:t,description:d||"",fileData:{name:f.name,size:f.size,type:f.type,blob:f},createdAt:Date.now()}); document.getElementById("fileTitle").value=""; document.getElementById("fileDesc").value=""; document.getElementById("singleFileInput").value=""; renderAdminZone(); renderPublicFeed(); }
  async function handleMultipleFiles(){ const pfx=document.getElementById("multiTitlePrefix")?.value.trim(); const cd=document.getElementById("multiDesc")?.value.trim()||""; const files=Array.from(document.getElementById("multiFileInput").files); if(!files.length)return alert("Select files"); for(const f of files){ let title=pfx?`${pfx} - ${f.name}`:f.name; if(title.length>80)title=title.slice(0,77)+"..."; await addPost({type:"file",title,description:cd,fileData:{name:f.name,size:f.size,type:f.type,blob:f},createdAt:Date.now()}); } document.getElementById("multiTitlePrefix").value=""; document.getElementById("multiDesc").value=""; document.getElementById("multiFileInput").value=""; alert(`✅ ${files.length} file(s) posted`); renderAdminZone(); renderPublicFeed(); }
  async function handlePasswordChange(){ const old=prompt("Current password:"); if(old!==localStorage.getItem(STORED_PASSWORD_KEY))return alert("Wrong password"); const np=prompt("New password (min 4 chars):"); if(!np||np.length<4)return alert("Min 4 chars"); if(np!==prompt("Confirm new password:"))return alert("Mismatch"); localStorage.setItem(STORED_PASSWORD_KEY,np); alert("Password changed!"); }

  function initTabs(){
    const pubPanel=document.getElementById("publicPanel"),adminPanel=document.getElementById("adminPanel");
    const pubBtn=document.getElementById("tabPublicBtn"),adminBtn=document.getElementById("tabAdminBtn");
    function setActive(tab){
      pubBtn.classList.toggle("active",tab==="public"); adminBtn.classList.toggle("active",tab==="admin");
      pubPanel.classList.toggle("hidden",tab!=="public"); adminPanel.classList.toggle("hidden",tab!=="admin");
      if(tab==="admin")renderAdminZone();
    }
    pubBtn.onclick=()=>setActive("public"); adminBtn.onclick=()=>setActive("admin"); setActive("public");
  }

  (async()=>{ initPassword(); await openDB(); await renderPublicFeed(); initTabs(); renderAdminZone(); })();
</script>
</body>
</html>
