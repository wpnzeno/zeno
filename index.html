<script>
// ========== CONFIGURATION – CHANGE THESE ==========
const GITHUB_TOKEN = "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";   // classic token with 'gist' scope
const GIST_ID      = "b116569a4992e42686aeeb78a4e087cc";                 // e.g., "abc123def456"
// =================================================

const GIST_API_URL = `https://api.github.com/gists/${GIST_ID}`;
let cachedPosts = [];      // local cache of posts (read from gist)
let dbInstance = null;
let currentAdminLoggedIn = false;

// helpers
function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }
function formatFileSize(bytes) { if (!bytes) return "0 B"; const k=1024, sizes=["B","KB","MB","GB"]; const i=Math.floor(Math.log(bytes)/Math.log(k)); return parseFloat((bytes/Math.pow(k,i)).toFixed(1))+" "+sizes[i]; }

// ---- Gist read/write ----
async function readGist() {
  if (GITHUB_TOKEN === "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") throw new Error("Please set your GitHub token and Gist ID in the code.");
  const res = await fetch(GIST_API_URL, { headers: { Authorization: `token ${GITHUB_TOKEN}` } });
  if (!res.ok) throw new Error(`Gist read failed: ${res.status}`);
  const data = await res.json();
  const files = data.files;
  const postsFile = files["posts.json"];
  if (!postsFile) return []; // no posts yet
  const content = postsFile.content;
  return content ? JSON.parse(content) : [];
}

async function writeGist(postsArray) {
  const content = JSON.stringify(postsArray, null, 2);
  const body = {
    files: { "posts.json": { content: content } }
  };
  const res = await fetch(GIST_API_URL, {
    method: "PATCH",
    headers: { Authorization: `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`Gist write failed: ${res.status}`);
}

// ---- Post CRUD (syncs to GitHub) ----
async function getAllPosts() {
  if (cachedPosts.length === 0) {
    cachedPosts = await readGist();
    // ensure each post has downloads/rating fields
    cachedPosts = cachedPosts.map(p => ({ ...p, downloads: p.downloads || 0, rating: p.rating || 0 }));
  }
  return [...cachedPosts].sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
}

async function addPost(postData) {
  const posts = await getAllPosts();
  const newId = Date.now(); // simple unique id
  const newPost = { id: newId, ...postData, downloads: 0, rating: 0, createdAt: Date.now() };
  posts.unshift(newPost);   // newest first
  await writeGist(posts);
  cachedPosts = posts;
  return newId;
}

async function updatePost(id, updatedData) {
  let posts = await getAllPosts();
  const index = posts.findIndex(p => p.id === id);
  if (index === -1) throw new Error("Post not found");
  posts[index] = { ...posts[index], ...updatedData };
  await writeGist(posts);
  cachedPosts = posts;
}

async function deletePostById(id) {
  let posts = await getAllPosts();
  posts = posts.filter(p => p.id !== id);
  await writeGist(posts);
  cachedPosts = posts;
}

async function incrementDownloads(id) {
  const posts = await getAllPosts();
  const post = posts.find(p => p.id === id);
  if (post) {
    await updatePost(id, { downloads: (post.downloads || 0) + 1 });
  }
}

// ---- UI helpers (mostly unchanged, but now use GitHub API) ----
async function updateStats() {
  const posts = await getAllPosts();
  document.getElementById("statPosts").innerText = posts.length;
  document.getElementById("statFiles").innerText = posts.filter(p => p.type === "file").length;
  document.getElementById("statLinks").innerText = posts.filter(p => p.type === "link").length;
}

function readImageAsBlob(file) {
  return new Promise((resolve) => {
    if (!file) resolve(null);
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

// Rendering the public feed (same as before, but using cachedPosts from GitHub)
let allPostsCache = [];

function renderFilteredPosts(posts) {
  const container = document.getElementById("publicPostsContainer");
  if (!posts.length) { container.innerHTML = `<div class="loading-state"><i class="fas fa-search"></i> no posts match</div>`; return; }
  let html = '';
  for (const post of posts) {
    const thumb = post.imageData ? `<img src="${post.imageData}" class="post-thumbnail" alt="thumbnail">` : '';
    if (post.type === "link") {
      html += `<div class="post-card">
        ${thumb}
        <div class="post-title"><i class="fas fa-link"></i> ${escapeHtml(post.title)}</div>
        ${post.description ? `<div class="post-description">${escapeHtml(post.description)}</div>` : ''}
        <div class="post-meta">
          <span><i class="fas fa-download"></i> ${post.downloads||0}</span>
          <a href="#" class="btn-icon open-link" data-id="${post.id}" data-url="${escapeHtml(post.url)}"><i class="fas fa-external-link-alt"></i> open</a>
        </div>
      </div>`;
    } else {
      html += `<div class="post-card">
        ${thumb}
        <div class="post-title"><i class="fas fa-file-alt"></i> ${escapeHtml(post.title)}</div>
        ${post.description ? `<div class="post-description">${escapeHtml(post.description)}</div>` : ''}
        <div class="post-meta">
          <span><i class="fas fa-download"></i> ${post.downloads||0}</span>
          <button class="btn-icon download-file" data-id="${post.id}"><i class="fas fa-download"></i> download</button>
        </div>
      </div>`;
    }
  }
  container.innerHTML = html;
  for (const post of posts) {
    if (post.type === "link") {
      const btn = container.querySelector(`.open-link[data-id="${post.id}"]`);
      btn?.addEventListener("click", async (e) => { e.preventDefault(); await incrementDownloads(post.id); renderPublicFeed(); window.open(btn.dataset.url,'_blank'); });
    } else if (post.type === "file" && post.fileData?.blob) {
      const btn = container.querySelector(`.download-file[data-id="${post.id}"]`);
      btn?.addEventListener("click", async () => { await incrementDownloads(post.id); downloadFileFromPost(post); renderPublicFeed(); });
    }
  }
}

async function renderSearchSuggestions(query) {
  const suggestionsDiv = document.getElementById("searchSuggestions");
  if (!query.trim()) { suggestionsDiv.classList.remove("show"); return; }
  const lowerQuery = query.toLowerCase();
  const matches = allPostsCache.filter(post => post.title.toLowerCase().includes(lowerQuery)).slice(0, 8);
  if (matches.length === 0) { suggestionsDiv.classList.remove("show"); return; }
  let html = '';
  for (const post of matches) html += `<div class="suggestion-item" data-id="${post.id}">${escapeHtml(post.title)}</div>`;
  suggestionsDiv.innerHTML = html;
  suggestionsDiv.classList.add("show");
  document.querySelectorAll(".suggestion-item").forEach(item => {
    item.addEventListener("click", () => {
      const postId = parseInt(item.dataset.id);
      const selectedPost = allPostsCache.find(p => p.id === postId);
      if (selectedPost) {
        document.getElementById("searchInput").value = selectedPost.title;
        renderFilteredPosts([selectedPost]);
        suggestionsDiv.classList.remove("show");
      }
    });
  });
}

async function renderPublicFeed() {
  const container = document.getElementById("publicPostsContainer");
  if (!container) return;
  try {
    const posts = await getAllPosts();
    allPostsCache = posts;
    await updateStats();
    if (!posts.length) { container.innerHTML = `<div class="loading-state"><i class="fas fa-inbox"></i> nothing posted yet</div>`; return; }
    let html = '';
    for (const post of posts) {
      const thumb = post.imageData ? `<img src="${post.imageData}" class="post-thumbnail" alt="thumbnail">` : '';
      if (post.type === "link") {
        html += `<div class="post-card">
          ${thumb}
          <div class="post-title"><i class="fas fa-link"></i> ${escapeHtml(post.title)}</div>
          ${post.description ? `<div class="post-description">${escapeHtml(post.description)}</div>` : ''}
          <div class="post-meta">
            <span><i class="fas fa-download"></i> ${post.downloads||0}</span>
            <a href="#" class="btn-icon open-link" data-id="${post.id}" data-url="${escapeHtml(post.url)}"><i class="fas fa-external-link-alt"></i> open</a>
          </div>
        </div>`;
      } else {
        html += `<div class="post-card">
          ${thumb}
          <div class="post-title"><i class="fas fa-file-alt"></i> ${escapeHtml(post.title)}</div>
          ${post.description ? `<div class="post-description">${escapeHtml(post.description)}</div>` : ''}
          <div class="post-meta">
            <span><i class="fas fa-download"></i> ${post.downloads||0}</span>
            <button class="btn-icon download-file" data-id="${post.id}"><i class="fas fa-download"></i> download</button>
          </div>
        </div>`;
      }
    }
    container.innerHTML = html;
    for (const post of posts) {
      if (post.type === "link") {
        const btn = container.querySelector(`.open-link[data-id="${post.id}"]`);
        btn?.addEventListener("click", async (e) => { e.preventDefault(); await incrementDownloads(post.id); renderPublicFeed(); window.open(btn.dataset.url,'_blank'); });
      } else if (post.type === "file" && post.fileData?.blob) {
        const btn = container.querySelector(`.download-file[data-id="${post.id}"]`);
        btn?.addEventListener("click", async () => { await incrementDownloads(post.id); downloadFileFromPost(post); renderPublicFeed(); });
      }
    }
  } catch(err) { 
    console.error(err);
    container.innerHTML = `<div class="loading-state">⚠️ GitHub error: ${err.message}<br>Check your token and gist ID.</div>`;
  }
}

function downloadFileFromPost(post){ if(!post.fileData?.blob)return; const a=document.createElement("a"); a.href=URL.createObjectURL(post.fileData.blob); a.download=post.fileData.name; document.body.appendChild(a); a.click(); document.body.removeChild(a); }

// ---- Admin zone (with all forms) – same logic but uses GitHub CRUD ----
const STORED_PASSWORD_KEY = "archive_admin_pass";
const DEFAULT_PASSWORD = "Lordexploits@1_pn";
function initPassword() { if (!localStorage.getItem(STORED_PASSWORD_KEY)) localStorage.setItem(STORED_PASSWORD_KEY, DEFAULT_PASSWORD); }

async function renderAdminZone() {
  const container = document.getElementById("adminContentArea");
  if (!container) return;
  if (!currentAdminLoggedIn) {
    container.innerHTML = `<div class="admin-auth-container"><div style="max-width:420px; margin:0 auto; text-align:center"><i class="fas fa-fingerprint" style="font-size:2.5rem; color:#00e0ff"></i><h3>admin authentication</h3><p style="font-size:0.8rem">only the owner can manage tools</p><div style="background:rgba(0,0,0,0.5); padding:1.5rem; border-radius:1.5rem"><input type="password" id="adminPassInput" placeholder="master password" style="width:100%; margin-bottom:1rem"><button id="adminLoginBtn" class="btn-primary" style="width:100%"><i class="fas fa-unlock-alt"></i> unlock</button></div></div></div>`;
    document.getElementById("adminLoginBtn")?.addEventListener("click", () => { if(document.getElementById("adminPassInput").value.trim() === localStorage.getItem(STORED_PASSWORD_KEY)) { currentAdminLoggedIn = true; renderAdminZone(); renderPublicFeed(); } else alert("❌ wrong password"); });
    return;
  }
  const posts = await getAllPosts();
  container.innerHTML = `
    <div>
      <div style="display:flex; justify-content:space-between; flex-wrap:wrap; margin-bottom:1.5rem">
        <h3><i class="fas fa-crown"></i> admin controls</h3>
        <div><button id="changePwdBtn" class="btn-icon"><i class="fas fa-key"></i> change password</button> <button id="logoutAdminBtn" class="btn-icon" style="border-color:#ff4d6d"><i class="fas fa-sign-out-alt"></i> logout</button></div>
      </div>
      <div id="adminFormsWrapper" class="admin-forms-wrapper">
        <div class="admin-form"><h4><i class="fas fa-link"></i> add new link</h4><input id="linkTitle" placeholder="Title *"><input id="linkUrl" placeholder="URL *"><textarea id="linkDesc" rows="2" placeholder="Description"></textarea><label>Thumbnail image (optional)</label><input type="file" id="linkImage" accept="image/*"><div id="linkImagePreview"></div><button id="submitLinkBtn" class="btn-primary">publish link</button></div>
        <div class="admin-form"><h4><i class="fas fa-file-upload"></i> upload file</h4><input id="fileTitle" placeholder="Title *"><textarea id="fileDesc" rows="2" placeholder="Description"></textarea><label>File</label><input type="file" id="singleFileInput" class="file-input"><label>Thumbnail image (optional)</label><input type="file" id="fileImage" accept="image/*"><div id="fileImagePreview"></div><button id="submitFileBtn" class="btn-primary">upload file</button></div>
        <div class="admin-form"><h4><i class="fas fa-layer-group"></i> multiple files</h4><input id="multiTitlePrefix" placeholder="Title prefix"><textarea id="multiDesc" rows="2" placeholder="Common description"></textarea><input type="file" id="multiFileInput" multiple class="file-input"><button id="submitMultiBtn" class="btn-primary">upload all</button></div>
        <button id="managePostsToggleBtn" class="manage-posts-toggle"><i class="fas fa-list-ul"></i> 📋 Manage Posts</button>
      </div>
      <div id="managePostsView" style="display: none;">
        <button id="backToHomeBtn" class="manage-posts-back-btn"><i class="fas fa-arrow-left"></i> ← Back to Home</button>
        <h3 style="margin:1rem 0">all posts (edit/delete)</h3>
        <div id="adminPostsList"></div>
      </div>
    </div>`;
  
  document.getElementById("submitLinkBtn")?.addEventListener("click", () => handleAddLinkWithImage());
  document.getElementById("submitFileBtn")?.addEventListener("click", () => handleAddFileWithImage());
  document.getElementById("submitMultiBtn")?.addEventListener("click", handleMultipleFiles);
  document.getElementById("logoutAdminBtn")?.addEventListener("click", () => { currentAdminLoggedIn = false; renderAdminZone(); renderPublicFeed(); });
  document.getElementById("changePwdBtn")?.addEventListener("click", handlePasswordChange);
  document.getElementById("linkImage")?.addEventListener("change", (e) => previewImage(e, "linkImagePreview"));
  document.getElementById("fileImage")?.addEventListener("change", (e) => previewImage(e, "fileImagePreview"));
  
  const formsWrapper = document.getElementById("adminFormsWrapper");
  const manageView = document.getElementById("managePostsView");
  const manageBtn = document.getElementById("managePostsToggleBtn");
  const backBtn = document.getElementById("backToHomeBtn");
  function showManageView() { formsWrapper.style.display = "none"; manageView.style.display = "block"; renderAdminPostsList(posts); }
  function showHomeView() { formsWrapper.style.display = "block"; manageView.style.display = "none"; }
  manageBtn?.addEventListener("click", showManageView);
  backBtn?.addEventListener("click", showHomeView);
  showHomeView();
  renderAdminPostsList(posts);
}

function previewImage(event, previewId) {
  const file = event.target.files[0];
  const preview = document.getElementById(previewId);
  if (file) { const reader = new FileReader(); reader.onload = (e) => { preview.innerHTML = `<img src="${e.target.result}" class="image-preview">`; }; reader.readAsDataURL(file); } else { preview.innerHTML = ""; }
}

async function handleAddLinkWithImage() {
  const title = document.getElementById("linkTitle")?.value.trim();
  const url = document.getElementById("linkUrl")?.value.trim();
  const desc = document.getElementById("linkDesc")?.value.trim();
  const imageFile = document.getElementById("linkImage")?.files[0];
  if (!title || !url) return alert("Title and URL required");
  if (!url.startsWith("http")) return alert("Invalid URL");
  let imageData = null;
  if (imageFile) imageData = await readImageAsBlob(imageFile);
  await addPost({ type: "link", title, description: desc || "", url, imageData });
  document.getElementById("linkTitle").value = ""; document.getElementById("linkUrl").value = ""; document.getElementById("linkDesc").value = "";
  document.getElementById("linkImage").value = ""; document.getElementById("linkImagePreview").innerHTML = "";
  renderAdminZone(); renderPublicFeed();
}

async function handleAddFileWithImage() {
  const title = document.getElementById("fileTitle")?.value.trim();
  const desc = document.getElementById("fileDesc")?.value.trim();
  const file = document.getElementById("singleFileInput").files[0];
  const imageFile = document.getElementById("fileImage")?.files[0];
  if (!title || !file) return alert("Title and file required");
  let imageData = null; if (imageFile) imageData = await readImageAsBlob(imageFile);
  const fileData = { name: file.name, size: file.size, type: file.type, blob: file };
  await addPost({ type: "file", title, description: desc || "", fileData, imageData });
  document.getElementById("fileTitle").value = ""; document.getElementById("fileDesc").value = "";
  document.getElementById("singleFileInput").value = ""; document.getElementById("fileImage").value = "";
  document.getElementById("fileImagePreview").innerHTML = "";
  renderAdminZone(); renderPublicFeed();
}

async function renderAdminPostsList(posts){
  const listDiv = document.getElementById("adminPostsList");
  if (!listDiv) return;
  if (!posts.length) { listDiv.innerHTML = `<div class="loading-state">no posts yet</div>`; return; }
  let html = '';
  for (const post of posts) {
    const thumb = post.imageData ? `<img src="${post.imageData}" style="max-height:60px; border-radius:0.5rem; margin-right:0.5rem;">` : '';
    html += `<div class="admin-tool-card"><div class="tool-header"><div class="tool-title">${thumb}<i class="fas ${post.type==='link'?'fa-link':'fa-file-alt'}"></i> ${escapeHtml(post.title)}</div><div class="tool-actions"><button class="btn-icon edit-post" data-id="${post.id}" data-type="${post.type}"><i class="fas fa-edit"></i> edit</button><button class="btn-icon btn-danger delete-post" data-id="${post.id}"><i class="fas fa-trash-alt"></i> delete</button></div></div>${post.description?`<div class="tool-desc">${escapeHtml(post.description)}</div>`:''}<div class="tool-stats"><span><i class="fas fa-download"></i> Downloads: ${post.downloads||0}</span><span><i class="fas fa-star"></i> Rating: ${(post.rating||0).toFixed(1)}</span></div></div>`;
  }
  listDiv.innerHTML = html;
  document.querySelectorAll(".delete-post").forEach(btn => btn.addEventListener("click", async () => { if (confirm("Delete this post permanently?")) { await deletePostById(Number(btn.dataset.id)); renderAdminZone(); renderPublicFeed(); } }));
  document.querySelectorAll(".edit-post").forEach(btn => btn.addEventListener("click", () => editPostModal(Number(btn.dataset.id), btn.dataset.type)));
}

async function editPostModal(id, type) {
  const posts = await getAllPosts();
  const post = posts.find(p => p.id === id);
  if (!post) return;
  const newTitle = prompt("Edit title:", post.title); if (newTitle === null) return;
  const newDesc = prompt("Edit description:", post.description || "");
  let newDownloads = parseInt(prompt("Downloads count:", post.downloads || 0)) || 0;
  let newRating = parseFloat(prompt("Rating (0-5):", post.rating || 0)) || 0;
  if (newRating < 0) newRating = 0; if (newRating > 5) newRating = 5;
  let updateObj = { title: newTitle.trim(), description: newDesc.trim(), downloads: newDownloads, rating: newRating };
  if (type === "link") {
    const newUrl = prompt("Edit URL:", post.url);
    if (!newUrl?.startsWith("http")) return alert("Invalid URL");
    updateObj.url = newUrl.trim();
  }
  const changeImage = confirm("Do you want to change the thumbnail image? (OK = choose new image, Cancel = keep current)");
  if (changeImage) {
    const fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = "image/*";
    fileInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (file) { const imageData = await readImageAsBlob(file); updateObj.imageData = imageData; } else { updateObj.imageData = null; }
      await updatePost(id, updateObj);
      renderAdminZone(); renderPublicFeed();
    };
    fileInput.click();
    return;
  }
  await updatePost(id, updateObj);
  renderAdminZone(); renderPublicFeed();
}

async function handleMultipleFiles(){ const pfx=document.getElementById("multiTitlePrefix")?.value.trim(); const cd=document.getElementById("multiDesc")?.value.trim()||""; const files=Array.from(document.getElementById("multiFileInput").files); if(!files.length)return alert("Select files"); for(const f of files){ let title=pfx?`${pfx} - ${f.name}`:f.name; if(title.length>80)title=title.slice(0,77)+"..."; const fileData={name:f.name,size:f.size,type:f.type,blob:f}; await addPost({type:"file",title,description:cd,fileData}); } document.getElementById("multiTitlePrefix").value=""; document.getElementById("multiDesc").value=""; document.getElementById("multiFileInput").value=""; alert(`✅ ${files.length} file(s) posted`); renderAdminZone(); renderPublicFeed(); }
async function handlePasswordChange(){ const old=prompt("Current password:"); if(old!==localStorage.getItem(STORED_PASSWORD_KEY))return alert("Wrong password"); const np=prompt("New password (min 4 chars):"); if(!np||np.length<4)return alert("Min 4 chars"); if(np!==prompt("Confirm new password:"))return alert("Mismatch"); localStorage.setItem(STORED_PASSWORD_KEY,np); alert("Password changed!"); }

function initSidebar() {
  const hamburger = document.getElementById("hamburgerBtn");
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebarOverlay");
  const closeBtn = document.getElementById("closeSidebarBtn");
  function openSidebar() { sidebar.classList.add("open"); overlay.classList.add("active"); }
  function closeSidebar() { sidebar.classList.remove("open"); overlay.classList.remove("active"); }
  hamburger.onclick = openSidebar;
  closeBtn.onclick = closeSidebar;
  overlay.onclick = closeSidebar;
  const pubBtn = document.getElementById("sidebarPublicBtn");
  const adminBtn = document.getElementById("sidebarAdminBtn");
  const publicPanel = document.getElementById("publicPanel");
  const adminPanel = document.getElementById("adminPanel");
  const statsBlock = document.getElementById("statsBlock");
  function setActivePanel(panel) {
    if (panel === "public") {
      pubBtn.classList.add("active"); adminBtn.classList.remove("active");
      publicPanel.classList.remove("hidden"); adminPanel.classList.add("hidden");
      statsBlock.classList.remove("hidden");
      renderPublicFeed();
    } else {
      adminBtn.classList.add("active"); pubBtn.classList.remove("active");
      adminPanel.classList.remove("hidden"); publicPanel.classList.add("hidden");
      statsBlock.classList.add("hidden");
      renderAdminZone();
    }
    closeSidebar();
  }
  pubBtn.onclick = () => setActivePanel("public");
  adminBtn.onclick = () => setActivePanel("admin");
  setActivePanel("public");
}

function initSearch() {
  const searchInput = document.getElementById("searchInput");
  if (!searchInput) return;
  searchInput.addEventListener("input", (e) => {
    const query = e.target.value;
    if (query.trim() === "") { renderPublicFeed(); document.getElementById("searchSuggestions").classList.remove("show"); }
    else { renderSearchSuggestions(query); const filtered = allPostsCache.filter(post => post.title.toLowerCase().includes(query.toLowerCase())); renderFilteredPosts(filtered); }
  });
  document.addEventListener("click", (e) => { const suggestions = document.getElementById("searchSuggestions"); if (!searchInput.contains(e.target) && !suggestions.contains(e.target)) { suggestions.classList.remove("show"); } });
  const refreshBtn = document.getElementById("refreshFeedBtn");
  if (refreshBtn) refreshBtn.onclick = () => renderPublicFeed();
}

(async () => {
  initPassword();
  // First try to read from GitHub; if token missing, fallback to empty
  try {
    await getAllPosts(); // preload cache
  } catch(e) { console.warn(e); }
  await renderPublicFeed();
  initSidebar();
  renderAdminZone();
  initSearch();
})();
</script>
