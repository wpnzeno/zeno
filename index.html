<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Zeno | Sidebar Layout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ---------- DARK NEON / LORDEXPLOITS STYLE ---------- */
    :root {
      --bg-dark: #0a0c15;
      --bg-card: rgba(15, 20, 35, 0.7);
      --border-glow: rgba(0, 224, 255, 0.25);
      --accent-primary: #00e0ff;
      --accent-secondary: #8a2be2;
      --text-light: #f0f3ff;
      --text-muted: #a0a8c0;
      --danger: #ff4d6d;
      --sidebar-width: 260px;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 20%, #0a0f1f, #03050b);
      color: var(--text-light);
      min-height: 100vh;
    }
    /* main layout: flex with sidebar */
    .app-wrapper {
      display: flex;
      min-height: 100vh;
    }
    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-width);
      background: rgba(5, 10, 20, 0.7);
      backdrop-filter: blur(16px);
      border-right: 1px solid var(--border-glow);
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    /* sidebar buttons (vertical) */
    .sidebar-btn {
      background: rgba(15,20,35,0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0,224,255,0.3);
      padding: 0.9rem 1rem;
      border-radius: 60px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 1rem;
      width: 100%;
      justify-content: center;
    }
    .sidebar-btn i {
      font-size: 1.1rem;
    }
    .sidebar-btn.active {
      background: linear-gradient(95deg, var(--accent-primary), var(--accent-secondary));
      border-color: transparent;
      color: white;
      box-shadow: 0 0 12px rgba(0,224,255,0.4);
    }
    .sidebar-btn:hover:not(.active) {
      border-color: var(--accent-primary);
      color: white;
    }
    /* main content area */
    .main-content {
      flex: 1;
      padding: 2rem 2rem 2rem 2rem;
      overflow-x: auto;
    }
    /* Hero stats (full width inside main) */
    .hero {
      text-align: center;
      margin-bottom: 2rem;
    }
    .badge-group {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .badge {
      background: rgba(0,224,255,0.1);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-glow);
      padding: 0.4rem 1rem;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--accent-primary);
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--accent-primary), var(--accent-secondary));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .subtitle {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin-top: 1rem;
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-primary), #fff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }
    /* panels */
    .panel.hidden {
      display: none;
    }
    /* section headers */
    .section-header {
      margin-top: 1rem;
      margin-bottom: 2rem;
      text-align: center;
    }
    .section-header h2 {
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      justify-content: center;
    }
    .section-header p {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    /* posts grid */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .post-card, .admin-tool-card {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      border: 1px solid var(--border-glow);
      padding: 1.5rem;
      transition: all 0.25s;
    }
    .post-card:hover, .admin-tool-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-primary);
    }
    .post-title, .tool-title {
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }
    .post-description, .tool-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin: 0.5rem 0 1rem;
      line-height: 1.4;
    }
    .post-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: #6c7a9e;
    }
    .btn-icon, .btn-primary {
      background: rgba(0,224,255,0.1);
      border: 1px solid var(--border-glow);
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--accent-primary);
      transition: 0.2s;
    }
    .btn-primary {
      background: linear-gradient(95deg, var(--accent-primary), var(--accent-secondary));
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
    }
    .btn-danger {
      border-color: var(--danger);
      color: #ff9eae;
    }
    .btn-icon:hover {
      background: var(--accent-primary);
      color: #0a0c15;
    }
    .admin-form {
      background: rgba(15,25,45,0.6);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border-left: 3px solid var(--accent-primary);
    }
    .admin-form h4 {
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .admin-form input, .admin-form textarea, .file-input {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid #2a3560;
      padding: 0.7rem;
      border-radius: 1rem;
      color: white;
      margin-bottom: 0.8rem;
      font-family: inherit;
    }
    .tool-stats {
      display: flex;
      gap: 1.5rem;
      margin: 0.8rem 0;
      font-size: 0.8rem;
    }
    .tool-actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }
    .loading-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
    footer {
      margin-top: 3rem;
      text-align: center;
      border-top: 1px solid rgba(0,224,255,0.2);
      padding-top: 2rem;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1rem;
    }
    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      transition: 0.2s;
    }
    .footer-links a:hover {
      color: var(--accent-primary);
    }
    /* responsive: sidebar becomes top bar on small screens */
    @media (max-width: 768px) {
      .app-wrapper {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        flex-direction: row;
        justify-content: center;
        border-right: none;
        border-bottom: 1px solid var(--border-glow);
        padding: 1rem;
      }
      .sidebar-btn {
        width: auto;
        padding: 0.6rem 1.2rem;
      }
      .main-content {
        padding: 1.5rem;
      }
      h1 { font-size: 2rem; }
      .stats { gap: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <!-- Sidebar with two buttons -->
  <div class="sidebar">
    <button id="sidebarPublicBtn" class="sidebar-btn active"><i class="fas fa-globe"></i> content</button>
    <button id="sidebarAdminBtn" class="sidebar-btn"><i class="fas fa-user-shield"></i> admin</button>
  </div>

  <!-- Main content area -->
  <div class="main-content">
    <div class="hero">
      <div class="badge-group">
        <span class="badge"><i class="fas fa-lock"></i> secure</span>
        <span class="badge"><i class="fas fa-user-shield"></i> trusted</span>
      </div>
      <h1>Zeno</h1>
      <p class="subtitle">scripts · config files · executors</p>
      <div class="stats">
        <div class="stat"><div class="stat-number" id="statPosts">0</div><div class="stat-label">TOTAL POSTS</div></div>
        <div class="stat"><div class="stat-number" id="statFiles">0</div><div class="stat-label">FILES</div></div>
        <div class="stat"><div class="stat-number" id="statLinks">0</div><div class="stat-label">LINKS</div></div>
      </div>
    </div>

    <div id="publicPanel" class="panel">
      <div class="section-header"><h2><i class="fas fa-archive"></i> Contents</h2><p>downloadable resources</p></div>
      <div id="publicPostsContainer" class="posts-grid"><div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> loading...</div></div>
    </div>

    <div id="adminPanel" class="panel hidden">
      <div class="section-header"><h2><i class="fas fa-crown"></i> admin panel</h2><p>manage tools & content</p></div>
      <div id="adminContentArea" class="admin-dynamic"><div class="loading-state"><i class="fas fa-key"></i> verifying access...</div></div>
    </div>

    <footer>
      <div class="footer-links">
        <a href="https://youtube.com/@wpn-zeno" target="_blank" rel="noopener noreferrer"><i class="fab fa-youtube"></i> YouTube</a>
        <a href="https://discord.com/invite/5PtRGz9mDY" target="_blank" rel="noopener noreferrer"><i class="fab fa-discord"></i> Discord</a>
      </div>
      <p>© 2026 – zeno · your trusted provider</p>
    </footer>
  </div>
</div>

<script>
  // ========== FULL JAVASCRIPT (IndexedDB, admin, posts, downloads, rating, edit/delete) ==========
  const DB_NAME = "PrivateArchiveDB";
  const DB_VERSION = 6;
  const STORE_NAME = "posts";
  const STORED_PASSWORD_KEY = "archive_admin_pass";
  const DEFAULT_PASSWORD = "Lordexploits@1_pn";

  let dbInstance = null;
  let currentAdminLoggedIn = false;

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
  }
  function formatFileSize(bytes) {
    if (!bytes) return "0 B";
    const k = 1024, sizes = ["B","KB","MB","GB"];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + " " + sizes[i];
  }
  function initPassword() {
    if (!localStorage.getItem(STORED_PASSWORD_KEY))
      localStorage.setItem(STORED_PASSWORD_KEY, DEFAULT_PASSWORD);
  }

  function openDB() {
    return new Promise((resolve, reject) => {
      if (dbInstance && dbInstance.name === DB_NAME) return resolve(dbInstance);
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => { dbInstance = request.result; resolve(dbInstance); };
      request.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true }).createIndex("createdAt", "createdAt");
        }
      };
    });
  }

  async function getAllPosts() {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readonly");
      const index = tx.objectStore(STORE_NAME).index("createdAt");
      const req = index.openCursor(null, "prev");
      const results = [];
      req.onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) {
          let post = cursor.value;
          if (post.downloads === undefined) post.downloads = 0;
          if (post.rating === undefined) post.rating = 0;
          results.push(post);
          cursor.continue();
        } else resolve(results);
      };
      req.onerror = () => reject(req.error);
    });
  }

  async function addPost(postData) {
    const db = await openDB();
    postData.downloads = 0;
    postData.rating = 0;
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readwrite");
      const req = tx.objectStore(STORE_NAME).add(postData);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function updatePost(id, updatedData) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readwrite");
      const store = tx.objectStore(STORE_NAME);
      const getReq = store.get(id);
      getReq.onsuccess = () => {
        const old = getReq.result;
        if (!old) reject("Post not found");
        const merged = { ...old, ...updatedData, id: old.id };
        const putReq = store.put(merged);
        putReq.onsuccess = () => resolve();
        putReq.onerror = () => reject(putReq.error);
      };
      getReq.onerror = () => reject(getReq.error);
    });
  }

  async function deletePostById(id) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readwrite");
      const req = tx.objectStore(STORE_NAME).delete(id);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  async function incrementDownloads(id) {
    const posts = await getAllPosts();
    const post = posts.find(p => p.id === id);
    if (post) {
      await updatePost(id, { downloads: (post.downloads || 0) + 1 });
    }
  }

  async function updateStats() {
    const posts = await getAllPosts();
    document.getElementById("statPosts").innerText = posts.length;
    document.getElementById("statFiles").innerText = posts.filter(p => p.type === "file").length;
    document.getElementById("statLinks").innerText = posts.filter(p => p.type === "link").length;
  }

  async function renderPublicFeed() {
    const container = document.getElementById("publicPostsContainer");
    if (!container) return;
    try {
      const posts = await getAllPosts();
      await updateStats();
      if (!posts.length) {
        container.innerHTML = `<div class="loading-state"><i class="fas fa-inbox"></i> nothing posted yet</div>`;
        return;
      }
      let html = '';
      for (const post of posts) {
        if (post.type === "link") {
          html += `<div class="post-card">
            <div class="post-title"><i class="fas fa-link"></i> ${escapeHtml(post.title)}</div>
            ${post.description ? `<div class="post-description">${escapeHtml(post.description)}</div>` : ''}
            <div class="post-meta">
              <span><i class="fas fa-download"></i> ${post.downloads || 0}</span>
              <a href="#" class="btn-icon open-link" data-id="${post.id}" data-url="${escapeHtml(post.url)}"><i class="fas fa-external-link-alt"></i> open</a>
            </div>
          </div>`;
        } else if (post.type === "file") {
          const file = post.fileData;
          const isImage = file?.type?.startsWith("image/");
          html += `<div class="post-card">
            <div class="post-title"><i class="fas fa-file-alt"></i> ${escapeHtml(post.title)}</div>
            ${post.description ? `<div class="post-description">${escapeHtml(post.description)}</div>` : ''}
            <div class="post-meta">
              <span><i class="fas fa-download"></i> ${post.downloads || 0}</span>
              <button class="btn-icon download-file" data-id="${post.id}"><i class="fas fa-download"></i> download</button>
            </div>
            ${isImage ? `<img id="preview-${post.id}" style="max-height:100px; margin-top:0.5rem; border-radius:0.5rem;">` : ''}
          </div>`;
        }
      }
      container.innerHTML = html;
      for (const post of posts) {
        if (post.type === "link") {
          const btn = container.querySelector(`.open-link[data-id="${post.id}"]`);
          if (btn) {
            btn.addEventListener("click", async (e) => {
              e.preventDefault();
              await incrementDownloads(post.id);
              window.open(btn.dataset.url, '_blank');
              renderPublicFeed();
            });
          }
        } else if (post.type === "file" && post.fileData?.blob) {
          const btn = container.querySelector(`.download-file[data-id="${post.id}"]`);
          if (btn) {
            btn.addEventListener("click", async () => {
              await incrementDownloads(post.id);
              downloadFileFromPost(post);
              renderPublicFeed();
            });
          }
          if (post.fileData.type?.startsWith("image/")) {
            const img = document.getElementById(`preview-${post.id}`);
            if (img && post.fileData.blob) {
              const url = URL.createObjectURL(post.fileData.blob);
              img.src = url;
              img.onload = () => URL.revokeObjectURL(url);
            }
          }
        }
      }
    } catch (err) {
      console.error(err);
      container.innerHTML = `<div class="loading-state">⚠️ error loading posts</div>`;
    }
  }

  function downloadFileFromPost(post) {
    if (!post.fileData?.blob) return;
    const a = document.createElement("a");
    a.href = URL.createObjectURL(post.fileData.blob);
    a.download = post.fileData.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  async function renderAdminZone() {
    const container = document.getElementById("adminContentArea");
    if (!container) return;
    if (!currentAdminLoggedIn) {
      container.innerHTML = `
        <div style="max-width:420px; margin:2rem auto; text-align:center">
          <i class="fas fa-fingerprint" style="font-size:2.5rem; color:#00e0ff"></i>
          <h3>admin authentication</h3>
          <p style="font-size:0.8rem">only the owner can manage tools</p>
          <div style="background:rgba(0,0,0,0.5); padding:1.5rem; border-radius:1.5rem">
            <input type="password" id="adminPassInput" placeholder="master password" style="width:100%; margin-bottom:1rem">
            <button id="adminLoginBtn" class="btn-primary" style="width:100%"><i class="fas fa-unlock-alt"></i> unlock</button>
          </div>
        </div>`;
      document.getElementById("adminLoginBtn")?.addEventListener("click", () => {
        if (document.getElementById("adminPassInput").value.trim() === localStorage.getItem(STORED_PASSWORD_KEY)) {
          currentAdminLoggedIn = true;
          renderAdminZone();
          renderPublicFeed();
        } else alert("❌ wrong password");
      });
      return;
    }
    const posts = await getAllPosts();
    container.innerHTML = `
      <div>
        <div style="display:flex; justify-content:space-between; flex-wrap:wrap; margin-bottom:1.5rem">
          <h3><i class="fas fa-crown"></i> admin controls</h3>
          <div>
            <button id="changePwdBtn" class="btn-icon"><i class="fas fa-key"></i> change password</button>
            <button id="logoutAdminBtn" class="btn-icon" style="border-color:#ff4d6d"><i class="fas fa-sign-out-alt"></i> logout</button>
          </div>
        </div>
        <div class="admin-form">
          <h4><i class="fas fa-link"></i> add new link</h4>
          <input id="linkTitle" placeholder="Title *">
          <input id="linkUrl" placeholder="URL *">
          <textarea id="linkDesc" rows="2" placeholder="Description"></textarea>
          <button id="submitLinkBtn" class="btn-primary">publish link</button>
        </div>
        <div class="admin-form">
          <h4><i class="fas fa-file-upload"></i> upload file</h4>
          <input id="fileTitle" placeholder="Title *">
          <textarea id="fileDesc" rows="2" placeholder="Description"></textarea>
          <input type="file" id="singleFileInput" class="file-input">
          <button id="submitFileBtn" class="btn-primary">upload file</button>
        </div>
        <div class="admin-form">
          <h4><i class="fas fa-layer-group"></i> multiple files</h4>
          <input id="multiTitlePrefix" placeholder="Title prefix (optional)">
          <textarea id="multiDesc" rows="2" placeholder="Common description"></textarea>
          <input type="file" id="multiFileInput" multiple class="file-input">
          <button id="submitMultiBtn" class="btn-primary">upload all files</button>
        </div>
        <h3 style="margin:2rem 0 1rem">manage tools & content</h3>
        <div id="adminPostsList"></div>
      </div>`;
    await renderAdminPostsList(posts);
    document.getElementById("submitLinkBtn")?.addEventListener("click", handleAddLink);
    document.getElementById("submitFileBtn")?.addEventListener("click", handleAddFile);
    document.getElementById("submitMultiBtn")?.addEventListener("click", handleMultipleFiles);
    document.getElementById("logoutAdminBtn")?.addEventListener("click", () => {
      currentAdminLoggedIn = false;
      renderAdminZone();
      renderPublicFeed();
    });
    document.getElementById("changePwdBtn")?.addEventListener("click", handlePasswordChange);
  }

  async function renderAdminPostsList(posts) {
    const listDiv = document.getElementById("adminPostsList");
    if (!posts.length) {
      listDiv.innerHTML = `<div class="loading-state">no tools yet</div>`;
      return;
    }
    let html = '';
    for (const post of posts) {
      html += `
        <div class="admin-tool-card">
          <div class="tool-header">
            <div class="tool-title"><i class="fas ${post.type === 'link' ? 'fa-link' : 'fa-file-alt'}"></i> ${escapeHtml(post.title)}</div>
            <div class="tool-actions">
              <button class="btn-icon edit-post" data-id="${post.id}" data-type="${post.type}"><i class="fas fa-edit"></i> edit</button>
              <button class="btn-icon btn-danger delete-post" data-id="${post.id}"><i class="fas fa-trash-alt"></i> delete</button>
            </div>
          </div>
          ${post.description ? `<div class="tool-desc">${escapeHtml(post.description)}</div>` : ''}
          <div class="tool-stats">
            <span><i class="fas fa-download"></i> Downloads: ${post.downloads || 0}</span>
            <span><i class="fas fa-star"></i> Rating: ${(post.rating || 0).toFixed(1)}</span>
          </div>
        </div>`;
    }
    listDiv.innerHTML = html;
    document.querySelectorAll(".delete-post").forEach(btn => btn.addEventListener("click", async () => {
      if (confirm("Delete this post permanently?")) {
        await deletePostById(Number(btn.dataset.id));
        renderAdminZone();
        renderPublicFeed();
      }
    }));
    document.querySelectorAll(".edit-post").forEach(btn => btn.addEventListener("click", () => editPostModal(Number(btn.dataset.id), btn.dataset.type)));
  }

  async function editPostModal(id, type) {
    const posts = await getAllPosts();
    const post = posts.find(p => p.id === id);
    if (!post) return;
    const newTitle = prompt("Edit title:", post.title);
    if (newTitle === null) return;
    const newDesc = prompt("Edit description:", post.description || "");
    let newDownloads = parseInt(prompt("Downloads count:", post.downloads || 0)) || 0;
    let newRating = parseFloat(prompt("Rating (0-5, e.g., 4.5):", post.rating || 0)) || 0;
    if (newRating < 0) newRating = 0;
    if (newRating > 5) newRating = 5;
    let updateObj = { title: newTitle.trim(), description: newDesc.trim(), downloads: newDownloads, rating: newRating };
    if (type === "link") {
      const newUrl = prompt("Edit URL:", post.url);
      if (!newUrl?.startsWith("http")) return alert("URL must start with http");
      updateObj.url = newUrl.trim();
    }
    await updatePost(id, updateObj);
    renderAdminZone();
    renderPublicFeed();
  }

  async function handleAddLink() {
    const title = document.getElementById("linkTitle")?.value.trim();
    const url = document.getElementById("linkUrl")?.value.trim();
    const desc = document.getElementById("linkDesc")?.value.trim();
    if (!title || !url) return alert("Title and URL required");
    if (!url.startsWith("http")) return alert("URL must start with http:// or https://");
    await addPost({ type: "link", title, description: desc || "", url, createdAt: Date.now() });
    document.getElementById("linkTitle").value = "";
    document.getElementById("linkUrl").value = "";
    document.getElementById("linkDesc").value = "";
    renderAdminZone();
    renderPublicFeed();
  }

  async function handleAddFile() {
    const title = document.getElementById("fileTitle")?.value.trim();
    const desc = document.getElementById("fileDesc")?.value.trim();
    const file = document.getElementById("singleFileInput").files[0];
    if (!title || !file) return alert("Title and file required");
    const fileData = { name: file.name, size: file.size, type: file.type, blob: file };
    await addPost({ type: "file", title, description: desc || "", fileData, createdAt: Date.now() });
    document.getElementById("fileTitle").value = "";
    document.getElementById("fileDesc").value = "";
    document.getElementById("singleFileInput").value = "";
    renderAdminZone();
    renderPublicFeed();
  }

  async function handleMultipleFiles() {
    const prefix = document.getElementById("multiTitlePrefix")?.value.trim();
    const commonDesc = document.getElementById("multiDesc")?.value.trim() || "";
    const files = Array.from(document.getElementById("multiFileInput").files);
    if (!files.length) return alert("Select at least one file");
    for (const file of files) {
      let title = prefix ? `${prefix} - ${file.name}` : file.name;
      if (title.length > 80) title = title.slice(0, 77) + "...";
      const fileData = { name: file.name, size: file.size, type: file.type, blob: file };
      await addPost({ type: "file", title, description: commonDesc, fileData, createdAt: Date.now() });
    }
    document.getElementById("multiTitlePrefix").value = "";
    document.getElementById("multiDesc").value = "";
    document.getElementById("multiFileInput").value = "";
    alert(`✅ ${files.length} file(s) posted`);
    renderAdminZone();
    renderPublicFeed();
  }

  async function handlePasswordChange() {
    const old = prompt("Current password:");
    if (old !== localStorage.getItem(STORED_PASSWORD_KEY)) return alert("Wrong current password");
    const newPass = prompt("New password (min 4 chars):");
    if (!newPass || newPass.length < 4) return alert("At least 4 characters");
    if (newPass !== prompt("Confirm new password:")) return alert("Passwords do not match");
    localStorage.setItem(STORED_PASSWORD_KEY, newPass);
    alert("Password changed successfully!");
  }

  // sidebar activation
  function initSidebar() {
    const pubBtn = document.getElementById("sidebarPublicBtn");
    const adminBtn = document.getElementById("sidebarAdminBtn");
    const publicPanel = document.getElementById("publicPanel");
    const adminPanel = document.getElementById("adminPanel");

    function setActivePanel(panel) {
      if (panel === "public") {
        pubBtn.classList.add("active");
        adminBtn.classList.remove("active");
        publicPanel.classList.remove("hidden");
        adminPanel.classList.add("hidden");
      } else {
        adminBtn.classList.add("active");
        pubBtn.classList.remove("active");
        adminPanel.classList.remove("hidden");
        publicPanel.classList.add("hidden");
        renderAdminZone();  // refresh admin panel when opened
      }
    }
    pubBtn.onclick = () => setActivePanel("public");
    adminBtn.onclick = () => setActivePanel("admin");
    setActivePanel("public");
  }

  (async () => {
    initPassword();
    await openDB();
    await renderPublicFeed();
    initSidebar();
    renderAdminZone(); // preload but hidden
  })();
</script>
</body>
</html>
